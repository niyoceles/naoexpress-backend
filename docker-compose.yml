version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/relayxpress
      - JWT_SECRET=relay_xpress_secret_key_2024
      - JWT_REFRESH_SECRET=relay_xpress_refresh_secret_key_2024
      - NODE_ENV=development
    depends_on:
      - mongodb

volumes:
  mongodb_data:
